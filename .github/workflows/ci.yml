name: CI Pipeline

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with dev deps
        run: pip install -e ".[dev]"
      - name: Run ruff
        run: ruff check src/ajp/
      - name: Run mypy
        run: mypy src/ajp/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest src/ajp/tests/ -v --tb=short
      - name: Generate coverage
        if: matrix.python == '3.11'
        run: pytest src/ajp/tests/ --cov=ajp --cov-report=xml
      - name: Upload coverage
        if: matrix.python == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install bandit safety
      - name: Run bandit
        run: bandit -r src/ajp/ -ll || true
      - name: Check dependencies
        run: safety check --json --output safety-report.json || true

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ajp_test
          POSTGRES_PASSWORD: ajp_test_pass
          POSTGRES_DB: ajp_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with postgres
        run: pip install -e ".[dev,postgres]"
      - name: Run integration tests
        env:
          AJP_POSTGRES_URL: postgresql+asyncpg://ajp_test:ajp_test_pass@localhost:5432/ajp_test_db
        run: pytest src/ajp/tests/test_phase7.py -v --tb=short -k "postgres"
