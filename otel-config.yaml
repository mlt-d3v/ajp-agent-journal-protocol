receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 100

exporters:
  logging:
    loglevel: info
  console:

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging, console]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging, console]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging, console]
